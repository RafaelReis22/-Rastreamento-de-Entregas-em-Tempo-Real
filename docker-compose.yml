version: '3.9'

# ============================================================
# Rastreamento de Entregas em Tempo Real — Infraestrutura Local
# Uso: docker compose up -d
# ============================================================

networks:
  rastreamento-net:
    driver: bridge

volumes:
  pg-auth-data:
  pg-delivery-data:
  pg-tracking-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:

  # ── Banco de dados: auth_db ──────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: pg-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pg-auth-data:/var/lib/postgresql/data
      - ./infra/scripts/init-auth.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rastreamento-net

  # ── Banco de dados: delivery_db ─────────────────────────────
  postgres-delivery:
    image: postgres:16-alpine
    container_name: pg-delivery
    restart: unless-stopped
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: ${POSTGRES_DELIVERY_PASSWORD:-dev_password}
    ports:
      - "5433:5432"
    volumes:
      - pg-delivery-data:/var/lib/postgresql/data
      - ./infra/scripts/init-delivery.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_user -d delivery_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rastreamento-net

  # ── Banco de dados: tracking_db ─────────────────────────────
  postgres-tracking:
    image: postgres:16-alpine
    container_name: pg-tracking
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracking_db
      POSTGRES_USER: tracking_user
      POSTGRES_PASSWORD: ${POSTGRES_TRACKING_PASSWORD:-dev_password}
    ports:
      - "5434:5432"
    volumes:
      - pg-tracking-data:/var/lib/postgresql/data
      - ./infra/scripts/init-tracking.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking_user -d tracking_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rastreamento-net

  # ── Redis (cache + blacklist de tokens + rate limit) ─────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev_password} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rastreamento-net

  # ── ZooKeeper (necessário para Kafka) ────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rastreamento-net

  # ── Apache Kafka ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - rastreamento-net

  # ── Criação automática dos Kafka Topics ─────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic location.updated --partitions 12 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic delivery.status.changed --partitions 6 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic notification.send --partitions 6 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic location.updated.DLT --partitions 3 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic delivery.status.changed.DLT --partitions 3 --replication-factor 1

      echo 'Todos os topics Kafka criados com sucesso.'
      "
    networks:
      - rastreamento-net

  # ── OpenTelemetry Collector ──────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    networks:
      - rastreamento-net

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - rastreamento-net

  # ── Loki (agregação de logs) ─────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - rastreamento-net

  # ── Promtail (coletor de logs → Loki) ───────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/loki/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - rastreamento-net

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - rastreamento-net
