server:
  port: 8082

spring:
  application:
    name: delivery-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_DELIVERY_HOST:localhost}:${POSTGRES_DELIVERY_PORT:5433}/${POSTGRES_DELIVERY_DB:delivery_db}
    username: ${POSTGRES_DELIVERY_USER:delivery_user}
    password: ${POSTGRES_DELIVERY_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  service:
    name: delivery-service
