name: CI — Build e Testes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  api-gateway:
    name: api-gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build e testes
        run: mvn -B verify

  auth-service:
    name: auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build e testes
        run: mvn -B verify

  delivery-service:
    name: delivery-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/delivery-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build e testes
        run: mvn -B verify

  tracking-service:
    name: tracking-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/tracking-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build e testes
        run: mvn -B verify

  websocket-service:
    name: websocket-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/websocket-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build e testes
        run: mvn -B verify

  notification-service:
    name: notification-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build e testes
        run: mvn -B verify

  frontend-web:
    name: frontend-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json
      - name: Instalar dependências
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Testes unitários
        run: npm test -- --passWithNoTests
      - name: Build de produção
        run: npm run build
